<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Niram Tuition Centre</title>
  <link rel="stylesheet" href="css/globals.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy-950), var(--navy-800));
      text-align: center;
      padding: var(--space-xl);
    }
    .error-code {
      font-family: var(--font-heading);
      font-size: 8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--gold-400), var(--saffron-500));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: var(--space-md);
    }
    .error-page h2 { color: #fff; margin-bottom: var(--space-md); }
    .error-page p { color: rgba(255,255,255,0.5); margin-bottom: var(--space-2xl); max-width: 400px; }
    .error-actions { display: flex; gap: var(--space-md); justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-code">404</div>
      <h2>Page Not Found</h2>
      <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Go Home</a>
        <a href="contact.html" class="btn btn-secondary">Contact Us</a>
      </div>
    </div>
  </div>
</body>
</html>
